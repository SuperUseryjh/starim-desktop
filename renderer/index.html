<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarIM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app">
        <div class="titlebar">
            <div class="titlebar-drag">
                <span class="app-logo">✦ StarIM</span>
            </div>
            <div class="titlebar-controls">
                <button class="titlebar-btn minimize" onclick="electronAPI.minimizeWindow()">─</button>
                <button class="titlebar-btn maximize" onclick="electronAPI.maximizeWindow()">□</button>
                <button class="titlebar-btn close" onclick="electronAPI.closeWindow()">✕</button>
            </div>
        </div>

        <div id="auth-page" class="page active">
            <div class="auth-container">
                <div class="auth-card">
                    <div class="auth-header">
                        <div class="auth-icon">✦</div>
                        <h1>StarIM</h1>
                        <p>连接你我，沟通无限</p>
                    </div>
                    
                    <div class="auth-tabs">
                        <button class="auth-tab active" data-tab="login">登录</button>
                        <button class="auth-tab" data-tab="register">注册</button>
                    </div>

                    <form id="login-form" class="auth-form active">
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" id="login-username" placeholder="请输入用户名" required>
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" id="login-password" placeholder="请输入密码" required>
                        </div>
                        <button type="submit" class="btn-primary">登 录</button>
                    </form>

                    <form id="register-form" class="auth-form">
                        <div class="form-group">
                            <label>用户名</label>
                            <input type="text" id="reg-username" placeholder="请输入用户名" required>
                        </div>
                        <div class="form-group">
                            <label>密码</label>
                            <input type="password" id="reg-password" placeholder="请输入密码" required>
                        </div>
                        <div class="form-group">
                            <label>确认密码</label>
                            <input type="password" id="reg-confirm" placeholder="请再次输入密码" required>
                        </div>
                        <button type="submit" class="btn-primary">注 册</button>
                    </form>
                </div>
            </div>
        </div>

        <div id="chat-page" class="page">
            <div class="chat-container">
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <div class="user-info">
                            <div class="user-avatar" id="current-user-avatar"></div>
                            <span class="user-name" id="current-user-name">用户名</span>
                        </div>
                        <div class="sidebar-actions">
                            <button class="icon-btn" id="create-group-btn" title="创建群组">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/>
                                </svg>
                            </button>
                            <button class="icon-btn" id="settings-btn" title="设置">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path fill="currentColor" d="M19.14 12.94c.04-.31.06-.63.06-.94 0-.31-.02-.63-.06-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                    
                    <div class="search-box">
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path fill="currentColor" d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                        </svg>
                        <input type="text" id="search-input" placeholder="搜索用户或群组...">
                    </div>

                    <div class="chat-tabs">
                        <button class="chat-tab active" data-type="private">私聊</button>
                        <button class="chat-tab" data-type="group">群聊</button>
                    </div>

                    <div class="chat-list" id="chat-list">
                        <div class="chat-list-empty">暂无聊天记录</div>
                    </div>
                </aside>

                <main class="chat-main">
                    <div class="chat-header" id="chat-header">
                        <div class="chat-header-info">
                            <div class="chat-avatar" id="chat-avatar"></div>
                            <div class="chat-details">
                                <h3 id="chat-title">选择一个聊天</h3>
                                <span id="chat-status"></span>
                            </div>
                        </div>
                        <div class="chat-header-actions">
                            <button class="icon-btn" id="chat-info-btn" title="聊天信息">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="messages-container" id="messages-container">
                        <div class="messages-empty">
                            <div class="empty-icon">💬</div>
                            <p>选择一个聊天开始对话</p>
                        </div>
                    </div>

                    <div class="message-input-area" id="message-input-area">
                        <div class="input-tools">
                            <button class="tool-btn" id="emoji-btn" title="表情">
                                <svg viewBox="0 0 24 24" width="22" height="22">
                                    <path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                                </svg>
                            </button>
                            <button class="tool-btn" id="image-btn" title="发送图片">
                                <svg viewBox="0 0 24 24" width="22" height="22">
                                    <path fill="currentColor" d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
                                </svg>
                            </button>
                        </div>
                        <textarea id="message-input" placeholder="输入消息..." rows="1"></textarea>
                        <button class="send-btn" id="send-btn">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                            </svg>
                        </button>
                    </div>
                </main>
            </div>
        </div>

        <div id="modal-overlay" class="modal-overlay hidden">
            <div class="modal" id="modal">
                <div class="modal-header">
                    <h3 id="modal-title">标题</h3>
                    <button class="modal-close" id="modal-close">✕</button>
                </div>
                <div class="modal-body" id="modal-body"></div>
            </div>
        </div>

        <div id="toast-container"></div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
